<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { padding: 0; margin: 0; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>
<div id="map"></div>
    <script>
     //   var map = L.map('map').setView([51.505, -0.09], 13);  // London
        var map = L.map('map').setView([32.59665920995979
, 44.02086555027], 14);   // Karbala
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 20,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // --- Leaflet Event Listener ---
        map.on('click', function(e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;

            // Optional: Drop a visual marker where they clicked
            L.marker([lat, lng]).addTo(map);

            // --- Send data to Jetpack Compose ---
            // Check if AndroidBridge exists to prevent crashes in desktop browsers during testing
            if (window.AndroidBridge) {
                window.AndroidBridge.sendCoordinatesToAndroid(lat, lng);
            }
        });
    </script>
</body>
</html>
